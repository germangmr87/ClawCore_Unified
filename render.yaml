services:
  - type: web
    name: clawcore
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: CLAWCORE_STATE_DIR
        value: /data/.clawcore
      - key: CLAWCORE_WORKSPACE_DIR
        value: /data/workspace
      - key: CLAWCORE_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: clawcore-data
      mountPath: /data
      sizeGB: 1
